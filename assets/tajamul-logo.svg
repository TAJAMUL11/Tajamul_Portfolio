<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFB2"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hex border shape -->
  <polygon points="16,2 27,8 27,24 16,30 5,24 5,8" fill="none" stroke="url(#fg)" stroke-width="1.2" opacity="0.8"/>

  <!-- TW monogram -->
  <text x="5" y="22" font-family="'Courier New', monospace" font-weight="900" font-size="16" fill="url(#fg)" filter="url(#glow)" letter-spacing="-1">TW</text>
</svg>
